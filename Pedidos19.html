<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResorTecnica Pro | Gestión de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #002d5a; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .info-label { font-weight: bold; color: #666; text-transform: uppercase; font-size: 0.65rem; }
        .info-value { color: #000; margin-bottom: 4px; border-bottom: 1px solid #eee; min-height: 1.2rem; }
        .item-row { background: white; padding: 10px; border-bottom: 1px solid #eee; }
        .resumen-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
        .login-container { max-width: 400px; margin: 60px auto; }
        .app-content { display: none; padding-bottom: 50px; }
    </style>
</head>
<body>

<div id="loginPage" class="container login-container">
    <div class="card p-4 text-center shadow-lg">
        <h3 class="fw-bold mb-4" style="color: var(--blue);">ResorTecnica S.R.L.</h3>
        <input type="text" id="userInput" class="form-control mb-3" placeholder="Usuario">
        <input type="password" id="passInput" class="form-control mb-4" placeholder="Contraseña">
        <button class="btn btn-primary w-100 fw-bold py-2" onclick="intentarLogin()">INGRESAR</button>
    </div>
</div>

<div id="appPage" class="app-content">
    <div class="header mb-3">
        <h5 class="fw-bold mb-0">ResorTecnica S.R.L.</h5>
        <div id="status" class="badge bg-light text-dark mt-2">Cargando base de datos...</div>
    </div>

    <div class="container">
        <div class="card p-3 shadow-sm">
            <div class="input-group mb-2">
                <input type="text" id="busCli" class="form-control fw-bold" placeholder="CÓDIGO CLIENTE + ENTER" onkeydown="handleEnterCliente(event)">
                <button class="btn btn-primary" onclick="buscarCliente()">BUSCAR</button>
            </div>
            
            <div id="infoCli" class="mt-2 p-2 bg-white rounded border-start border-4 border-primary" style="display:none;">
                <div class="fw-bold text-primary h6 mb-2" id="v_nom"></div>
                <div class="row g-2">
                    <div class="col-6"><div class="info-label">CUIT</div><div class="info-value" id="v_cuit"></div></div>
                    <div class="col-6"><div class="info-label">E-MAIL</div><div class="info-value text-lowercase" id="v_mail"></div></div>
                    <div class="col-12"><div class="info-label">Domicilio</div><div class="info-value" id="v_dom"></div></div>
                    <div class="col-6"><div class="info-label">Localidad</div><div class="info-value" id="v_loc"></div></div>
                    <div class="col-6"><div class="info-label">Provincia</div><div class="info-value" id="v_prov"></div></div>
                    <div class="col-6"><div class="info-label">Bonificación</div><div class="info-value text-success fw-bold" id="v_dto">0%</div></div>
                    <div class="col-6"><div class="info-label">Transporte</div><div class="info-value text-danger fw-bold" id="v_trans"></div></div>
                </div>
            </div>
        </div>

        <div class="card overflow-hidden shadow-sm">
            <div class="card-header bg-light py-2 fw-bold text-muted small">CARGA DE PEDIDO</div>
            <div id="contenedor-items"></div>
            <div class="p-2">
                <button class="btn btn-outline-primary btn-sm w-100 fw-bold" onclick="nuevaFila()">+ AGREGAR OTRO ARTÍCULO</button>
            </div>
        </div>

        <div class="card p-3 shadow-sm border-top border-4 border-primary">
            <div class="resumen-line"><span>Subtotal Bruto:</span> <span id="res_sub">$0,00</span></div>
            <div class="resumen-line text-success"><span>Bonificación (<span id="res_per">0</span>%):</span> <span id="res_dto">-$0,00</span></div>
            <div class="resumen-line fw-bold"><span>Subtotal Neto:</span> <span id="res_neto">$0,00</span></div>
            <div class="resumen-line text-muted"><span>IVA (21%):</span> <span id="res_iva">$0,00</span></div>
            <hr>
            <div class="resumen-line h4 fw-bold text-primary"><span>TOTAL FINAL:</span> <span id="v_total">$0,00</span></div>
        </div>

        <div class="d-grid gap-2 mb-4">
            <button class="btn btn-success btn-lg fw-bold" onclick="enviarPedido()">ENVIAR WHATSAPP</button>
            <button class="btn btn-dark btn-lg fw-bold" onclick="generarExcel()">DESCARGAR EXCEL PROFESIONAL</button>
            <button class="btn btn-link btn-sm text-muted" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
const USUARIOS = {
    "Chris": { pass: "0402", folder: "Chris" },
    "Lucas": { pass: "1234", folder: "01-11 De Blasi" },
    "Carlos": { pass: "1234", folder: "06 Payeres" },
    "Eduardo": { pass: "1234", folder: "07 Morales" },
    "Leandro": { pass: "1234", folder: "10 Serra" },
    "Andres": { pass: "1234", folder: "17 De Felice" },
    "Andrecito": { pass: "1234", folder: "20-21 Gallo" },
    "Hernan": { pass: "1234", folder: "22 Galo" },
    "Francisco": { pass: "1234", folder: "26 Schmid" },
    "Alfredo": { pass: "1234", folder: "30 Pavon" },
    "Ricardo": { pass: "1234", folder: "31 Gudiño" },
    "HernanR": { pass: "1234", folder: "32 Righi" }
};

let DB = { cli: {}, art: {}, tra: {} };
let SESION = null;
let CLIENTE_SEL = null;

function norm(txt) {
    if (!txt) return "";
    return txt.toString().trim().toLowerCase().split('.')[0].normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function fmt(num) {
    return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(num);
}

function intentarLogin() {
    const u = document.getElementById('userInput').value.trim();
    const p = document.getElementById('passInput').value;
    if (USUARIOS[u] && USUARIOS[u].pass === p) {
        SESION = USUARIOS[u];
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
        cargarBaseDatos(SESION.folder);
    } else { alert("Datos incorrectos"); }
}

async function cargarBaseDatos(folder) {
    const v = Date.now();
    const fetchCSV = async (name) => {
        const path = `data/${encodeURIComponent(folder)}/${name}.csv?v=${v}`;
        const r = await fetch(path);
        if(!r.ok) return [];
        const text = await r.text();
        return new Promise(res => {
            Papa.parse(text, {
                skipEmptyLines: 'greedy',
                complete: function(results) {
                    const data = results.data;
                    let hIdx = data.findIndex(row => row.some(c => ["CODIGO", "CLIENTE", "ARTICULO"].includes(norm(c).toUpperCase())));
                    if (hIdx === -1) hIdx = 0;
                    const headers = data[hIdx].map(h => norm(h).toUpperCase());
                    res(data.slice(hIdx + 1).map(row => {
                        let o = {};
                        headers.forEach((h, i) => o[h] = row[i] ? row[i].trim() : "");
                        return o;
                    }));
                }
            });
        });
    };

    try {
        const [c, a, t] = await Promise.all([fetchCSV('clientes'), fetchCSV('lista'), fetchCSV('transportes')]);
        c.forEach(i => DB.cli[norm(i.CODIGO || i.COD)] = i);
        a.forEach(i => DB.art[norm(i.CODIGO || i.COD || i.ARTICULO).toUpperCase()] = i);
        t.forEach(i => DB.tra[norm(i.CODIGO || i.COD)] = i);
        document.getElementById('status').innerText = "VENDEDOR: " + folder;
        nuevaFila();
    } catch (e) { alert("Error al conectar con la base de datos."); }
}

function handleEnterCliente(e) {
    if (e.key === 'Enter') {
        buscarCliente();
        setTimeout(() => document.querySelector('.art-input')?.focus(), 200);
    }
}

function buscarCliente() {
    let id = norm(document.getElementById('busCli').value);
    let c = DB.cli[id];
    if(c) {
        CLIENTE_SEL = c;
        document.getElementById('v_nom').innerText = c.CLIENTE || c.NOMBRE;
        document.getElementById('v_cuit').innerText = c.CUIT || "-";
        document.getElementById('v_mail').innerText = c.EMAIL1 || c.EMAIL || "(Sin Email)";
        document.getElementById('v_dom').innerText = c.DOMICILIO || "-";
        document.getElementById('v_loc').innerText = c.LOCALIDAD || "-";
        document.getElementById('v_prov').innerText = c.PROVINCIA || "-";
        document.getElementById('v_dto').innerText = (c.DTO || 0) + "%";
        document.getElementById('res_per').innerText = (c.DTO || 0);
        
        let tId = norm(c.TRANSPORTE);
        document.getElementById('v_trans').innerText = DB.tra[tId] ? DB.tra[tId].NOMBRE : "A CONVENIR";
        document.getElementById('infoCli').style.display = "block";
        calcular();
    } else { alert("Cliente no encontrado."); }
}

function nuevaFila() {
    const id = Date.now();
    const html = `
    <div class="item-row" id="f-${id}">
        <div class="row g-2 align-items-center">
            <div class="col-4"><input type="text" class="form-control form-control-sm art-input fw-bold" placeholder="CÓDIGO" onkeydown="handleArtKey(event, '${id}')"></div>
            <div class="col-4 small"><div class="fw-bold d-nom text-truncate">-</div><div class="text-muted d-pre">$0</div></div>
            <div class="col-2"><input type="number" class="form-control form-control-sm q-in text-center" value="1" onkeydown="handleQtyKey(event, '${id}')" oninput="calcular()"></div>
            <div class="col-2 text-end"><button class="btn btn-sm text-danger" onclick="document.getElementById('f-${id}').remove(); calcular();">✕</button></div>
        </div>
    </div>`;
    document.getElementById('contenedor-items').insertAdjacentHTML('beforeend', html);
    const ins = document.querySelectorAll('.art-input');
    ins[ins.length - 1].focus();
}

function handleArtKey(e, id) {
    if (e.key === 'Enter') {
        e.preventDefault();
        let codInput = e.target.value.trim().toUpperCase();
        let a = DB.art[codInput];
        let row = document.getElementById('f-'+id);
        if(a) {
            row.querySelector('.d-nom').innerText = a.DESCRIPCION;
            let p = parseFloat(a['LISTA 1']) || 0;
            row.querySelector('.d-pre').innerText = fmt(p);
            row.dataset.precio = p;
            row.dataset.nombre = a.DESCRIPCION;
            row.dataset.codigo = codInput; // Guardamos el código para el Excel
            row.querySelector('.q-in').focus();
            row.querySelector('.q-in').select();
            calcular();
        } else { alert("Artículo no encontrado."); }
    }
}

function handleQtyKey(e, id) {
    if (e.key === 'Enter') { e.preventDefault(); nuevaFila(); }
}

function calcular() {
    let sub = 0;
    document.querySelectorAll('[id^="f-"]').forEach(r => {
        sub += (parseFloat(r.dataset.precio || 0) * parseFloat(r.querySelector('.q-in').value || 0));
    });
    let porc = CLIENTE_SEL ? parseFloat(CLIENTE_SEL.DTO || 0) : 0;
    let dto = sub * (porc / 100);
    let neto = sub - dto;
    let iva = neto * 0.21;
    document.getElementById('res_sub').innerText = fmt(sub);
    document.getElementById('res_dto').innerText = "-" + fmt(dto);
    document.getElementById('res_neto').innerText = fmt(neto);
    document.getElementById('res_iva').innerText = fmt(iva);
    document.getElementById('v_total').innerText = fmt(neto + iva);
}

function enviarPedido() {
    if(!CLIENTE_SEL) return alert("Cargá un cliente");
    let items = "";
    document.querySelectorAll('[id^="f-"]').forEach(r => { 
        if(r.dataset.nombre) items += `• [${r.dataset.codigo}] ${r.dataset.nombre} (x${r.querySelector('.q-in').value})%0A`; 
    });
    let m = `*PEDIDO RESORTECNICA*%0A*Cliente:* ${document.getElementById('v_nom').innerText}%0A---%0A${items}---%0A*TOTAL:* ${document.getElementById('v_total').innerText}`;
    window.open(`https://wa.me/5491154678020?text=${m}`);
}

function generarExcel() {
    if(!CLIENTE_SEL) return alert("Seleccione un cliente");
    
    // Encabezado con datos del cliente
    let data = [
        ["RESORTECNICA S.R.L. - COMPROBANTE DE PEDIDO"],
        ["Vendedor:", SESION.folder],
        ["Fecha:", new Date().toLocaleDateString()],
        [],
        ["DATOS DEL CLIENTE"],
        ["Nombre:", document.getElementById('v_nom').innerText],
        ["CUIT:", document.getElementById('v_cuit').innerText],
        ["E-mail:", document.getElementById('v_mail').innerText],
        ["Domicilio:", document.getElementById('v_dom').innerText + ", " + document.getElementById('v_loc').innerText],
        ["Transporte:", document.getElementById('v_trans').innerText],
        [],
        ["CÓDIGO", "DESCRIPCIÓN", "CANTIDAD", "PRECIO LISTA", "SUBTOTAL BRUTO"]
    ];

    // Artículos
    document.querySelectorAll('[id^="f-"]').forEach(r => {
        if(r.dataset.nombre) {
            let q = parseFloat(r.querySelector('.q-in').value);
            let p = parseFloat(r.dataset.precio);
            data.push([r.dataset.codigo, r.dataset.nombre, q, p, (q*p)]);
        }
    });

    // Totales
    data.push(
        [],
        ["", "", "", "SUBTOTAL BRUTO:", document.getElementById('res_sub').innerText],
        ["", "", "", "BONIFICACIÓN ("+document.getElementById('res_per').innerText+"%):", document.getElementById('res_dto').innerText],
        ["", "", "", "SUBTOTAL NETO:", document.getElementById('res_neto').innerText],
        ["", "", "", "IVA (21%):", document.getElementById('res_iva').innerText],
        ["", "", "", "TOTAL A PAGAR:", document.getElementById('v_total').innerText]
    );

    const ws = XLSX.utils.aoa_to_sheet(data);
    
    // Ajuste automático de anchos de columna para que no se vea desprolijo
    ws['!cols'] = [
        { wch: 15 }, // Código
        { wch: 50 }, // Descripción
        { wch: 12 }, // Cantidad
        { wch: 15 }, // Precio
        { wch: 18 }  // Subtotal
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Pedido");
    XLSX.writeFile(wb, `Pedido_${document.getElementById('v_nom').innerText.replace(/ /g,'_')}.xlsx`);
}
</script>
</body>
</html>
