<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResorTecnica Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #002d5a; }
        body { background: #f4f7f6; font-family: sans-serif; padding-bottom: 50px; }
        .header { background: var(--blue); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .emergencia { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 10px; display: none; }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

<div class="header mb-4">
    <h3>ResorTecnica S.R.L.</h3>
    <div id="status" class="badge bg-warning text-dark">Intentando sincronizar...</div>
</div>

<div class="container">
    <div id="seccion-emergencia" class="emergencia mb-4">
        <p class="small fw-bold text-dark">⚠️ Brave bloqueó la carga automática. Por favor, cargá los archivos CSV manualmente:</p>
        <div class="row g-2">
            <div class="col-4"><label class="small">Clientes</label><input type="file" id="fCli" class="form-control form-control-sm" onchange="cargarManual('cli', this)"></div>
            <div class="col-4"><label class="small">Lista</label><input type="file" id="fArt" class="form-control form-control-sm" onchange="cargarManual('art', this)"></div>
            <div class="col-4"><label class="small">Transp.</label><input type="file" id="fTra" class="form-control form-control-sm" onchange="cargarManual('tra', this)"></div>
        </div>
    </div>

    <div class="card p-3">
        <div class="input-group">
            <input type="text" id="busCli" class="form-control" placeholder="Código de cliente...">
            <button class="btn btn-primary" onclick="buscarCliente()">BUSCAR</button>
        </div>
        <div id="resCli" style="display:none;" class="mt-3 small">
            <div class="fw-bold text-primary" id="v_nom"></div>
            <div id="v_info"></div>
        </div>
    </div>

    <div class="card p-3">
        <h6 class="fw-bold border-bottom pb-2">PEDIDO</h6>
        <div id="pedido-cont"></div>
        <button class="btn btn-outline-primary btn-sm w-100 mt-3" onclick="nuevaFila()">+ AGREGAR ARTÍCULO</button>
    </div>

    <div class="card p-3 bg-white" style="border-left: 5px solid var(--blue);">
        <div class="d-flex justify-content-between fw-bold h4 mb-0">
            <span>TOTAL:</span> <span id="v_total">$0.00</span>
        </div>
    </div>

    <div class="d-grid gap-2">
        <button class="btn btn-success btn-lg" onclick="whatsapp()">ENVIAR WHATSAPP</button>
    </div>
</div>

<script>
const URLS = {
    cli: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcf6CfxBxzmsizuk3WQpbOXA8TkbFv3rVdksLdXsa-gbPblAnq0BeoBLlESyoq52xRghPJOWFivJ84/pub?gid=349183463&single=true&output=csv",
    art: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcf6CfxBxzmsizuk3WQpbOXA8TkbFv3rVdksLdXsa-gbPblAnq0BeoBLlESyoq52xRghPJOWFivJ84/pub?gid=723287740&single=true&output=csv",
    tra: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcf6CfxBxzmsizuk3WQpbOXA8TkbFv3rVdksLdXsa-gbPblAnq0BeoBLlESyoq52xRghPJOWFivJ84/pub?gid=454586915&single=true&output=csv"
};

let DB = { cli: {}, art: {}, tra: {} };
let SELECT = null;

// Intento de carga automática
async function iniciar() {
    const parsePromise = (url) => new Promise((res, rej) => {
        Papa.parse(url, { download: true, header: true, complete: r => res(r.data), error: rej });
    });

    try {
        const [c, a, t] = await Promise.all([parsePromise(URLS.cli), parsePromise(URLS.art), parsePromise(URLS.tra)]);
        procesarData('cli', c);
        procesarData('art', a);
        procesarData('tra', t);
        document.getElementById('status').innerText = "✅ ONLINE";
        document.getElementById('status').className = "badge bg-success";
        nuevaFila();
    } catch (e) {
        document.getElementById('status').innerText = "⚠️ BLOQUEO DE BRAVE";
        document.getElementById('status').className = "badge bg-danger";
        document.getElementById('seccion-emergencia').style.display = "block";
        nuevaFila();
    }
}

function procesarData(tipo, data) {
    data.forEach(i => {
        if(tipo === 'cli' && i.Codigo) DB.cli[i.Codigo.toString().trim()] = i;
        if(tipo === 'art' && i.CODIGO) DB.art[i.CODIGO.toString().trim().toUpperCase()] = i;
        if(tipo === 'tra' && i.Codigo) DB.tra[i.Codigo.toString().trim()] = i;
    });
}

function cargarManual(tipo, input) {
    Papa.parse(input.files[0], {
        header: true,
        complete: (r) => {
            procesarData(tipo, r.data);
            alert(tipo.toUpperCase() + " cargado ok.");
        }
    });
}

window.onload = iniciar;

function buscarCliente() {
    let id = document.getElementById('busCli').value.trim();
    let c = DB.cli[id] || DB.cli[parseInt(id)];
    if(c) {
        SELECT = c;
        document.getElementById('v_nom').innerText = c.Cliente;
        let tId = c.Transporte ? c.Transporte.toString().trim() : "";
        let tNom = DB.tra[tId] ? DB.tra[tId].Nombre : "A convenir";
        document.getElementById('v_info').innerText = `CUIT: ${c.Cuit} | Bonif: ${c.dto}% | Transp: ${tNom}`;
        document.getElementById('resCli').style.display = "block";
        calcular();
    } else { alert("No encontrado. ¿Cargaste los archivos?"); }
}

function nuevaFila() {
    const id = Date.now();
    const h = `
    <div class="item-row" id="r-${id}">
        <div class="row g-2 align-items-center">
            <div class="col-4"><input type="text" class="form-control form-control-sm" placeholder="Cod" onchange="buscarArt(this, '${id}')"></div>
            <div class="col-6 small"><div class="fw-bold d-nom">-</div><div class="text-muted d-pre">$0</div></div>
            <div class="col-2 text-end"><button class="btn btn-sm text-danger" onclick="document.getElementById('r-${id}').remove(); calcular();">✕</button></div>
            <div class="col-4"><input type="number" class="form-control form-control-sm q-in" value="1" oninput="calcular()"></div>
        </div>
    </div>`;
    document.getElementById('pedido-cont').insertAdjacentHTML('beforeend', h);
}

function buscarArt(input, id) {
    let a = DB.art[input.value.trim().toUpperCase()];
    let row = document.getElementById('r-'+id);
    if(a) {
        row.querySelector('.d-nom').innerText = a.DESCRIPCION;
        let p = parseFloat(a['LISTA 1']) || 0;
        row.querySelector('.d-pre').innerText = "$" + p.toLocaleString();
        row.dataset.precio = p;
        calcular();
    }
}

function calcular() {
    let sub = 0;
    document.querySelectorAll('.item-row').forEach(r => {
        let p = parseFloat(r.dataset.precio || 0);
        let q = parseFloat(r.querySelector('.q-in').value || 0);
        sub += (p * q);
    });
    let dP = SELECT ? parseFloat(SELECT.dto || 0) : 0;
    let tot = (sub * (1 - dP/100)) * 1.21;
    document.getElementById('v_total').innerText = "$" + tot.toLocaleString('es-AR', {minimumFractionDigits:2});
}

function whatsapp() {
    if(!SELECT) return alert("Buscá un cliente");
    let m = `*PEDIDO:* ${SELECT.Cliente}%0A*TOTAL:* ${document.getElementById('v_total').innerText}`;
    window.open(`https://wa.me/5491154678020?text=${m}`);
}
</script>
</body>
</html>
