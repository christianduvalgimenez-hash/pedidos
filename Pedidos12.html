<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResorTecnica S.R.L. | Panel de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #002d5a; }
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .app-header { background: var(--blue); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .status-tag { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; }
        .item-row { background: white; padding: 12px; border-bottom: 1px solid #eee; }
        .label-resor { font-size: 0.7rem; font-weight: bold; color: #6c757d; text-transform: uppercase; }
        .value-resor { font-size: 0.95rem; font-weight: 600; color: #111; }
    </style>
</head>
<body>

<div class="app-header mb-4">
    <h3 class="fw-bold mb-1">ResorTecnica S.R.L.</h3>
    <div id="status" class="status-tag bg-light text-dark">Sincronizando con Google Drive...</div>
</div>

<div class="container">
    <div class="card p-3">
        <div class="input-group mb-2">
            <input type="text" id="busCli" class="form-control" placeholder="Código de cliente (ej: 779)">
            <button class="btn btn-primary fw-bold" onclick="buscarCliente()">BUSCAR</button>
        </div>
        <div id="infoCli" style="display:none;" class="row g-2 mt-2 p-2 bg-light rounded">
            <div class="col-12"><div class="label-resor">Razón Social</div><div id="v_nom" class="value-resor text-primary"></div></div>
            <div class="col-6"><div class="label-resor">CUIT</div><div id="v_cuit" class="value-resor"></div></div>
            <div class="col-6"><div class="label-resor">Bonif.</div><div id="v_dto" class="value-resor text-success"></div></div>
            <div class="col-12"><div class="label-resor">Transporte</div><div id="v_tra" class="value-resor text-danger"></div></div>
        </div>
    </div>

    <div class="card p-3">
        <h6 class="fw-bold border-bottom pb-2 mb-3">PRODUCTOS</h6>
        <div id="lista-pedido"></div>
        <button class="btn btn-outline-primary btn-sm w-100 mt-3 fw-bold" onclick="nuevaFila()">+ AGREGAR OTRO ARTÍCULO</button>
    </div>

    <div class="card p-4" style="border-left: 8px solid var(--blue);">
        <div class="d-flex justify-content-between fw-bold h4 mb-0">
            <span>TOTAL (con IVA):</span> <span id="v_total">$0,00</span>
        </div>
    </div>

    <div class="d-grid gap-2">
        <button class="btn btn-dark btn-lg" onclick="generarExcel()">DESCARGAR EXCEL</button>
        <button class="btn btn-success btn-lg" onclick="enviarWA()">ENVIAR POR WHATSAPP</button>
    </div>
</div>

<script>
const URLS = {
    cli: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcf6CfxBxzmsizuk3WQpbOXA8TkbFv3rVdksLdXsa-gbPblAnq0BeoBLlESyoq52xRghPJOWFivJ84/pub?gid=349183463&single=true&output=csv",
    art: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcf6CfxBxzmsizuk3WQpbOXA8TkbFv3rVdksLdXsa-gbPblAnq0BeoBLlESyoq52xRghPJOWFivJ84/pub?gid=723287740&single=true&output=csv",
    tra: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcf6CfxBxzmsizuk3WQpbOXA8TkbFv3rVdksLdXsa-gbPblAnq0BeoBLlESyoq52xRghPJOWFivJ84/pub?gid=454586915&single=true&output=csv"
};

let DB = { cli: {}, art: {}, tra: {} };
let CLIENTE_S = null;

// CARGA ROBUSTA CON PROXY PARA EVITAR BLOQUEO DE BRAVE
async function inicializar() {
    const cargarCSV = async (url) => {
        // Usamos un proxy que "engaña" al bloqueo de Brave
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const resp = await fetch(proxyUrl);
        const json = await resp.json();
        return new Promise(res => {
            Papa.parse(json.contents, {
                header: true,
                skipEmptyLines: true,
                complete: r => res(r.data)
            });
        });
    };

    try {
        const [c, a, t] = await Promise.all([cargarCSV(URLS.cli), cargarCSV(URLS.art), cargarCSV(URLS.tra)]);
        
        c.forEach(i => { if(i.Codigo) DB.cli[i.Codigo.toString().trim()] = i; });
        a.forEach(i => { if(i.CODIGO) DB.art[i.CODIGO.toString().trim().toUpperCase()] = i; });
        t.forEach(i => { if(i.Codigo) DB.tra[i.Codigo.toString().trim()] = i; });

        document.getElementById('status').innerText = "✅ SISTEMA CONECTADO";
        document.getElementById('status').className = "status-tag bg-success text-white";
        nuevaFila();
    } catch (e) {
        document.getElementById('status').innerText = "❌ ERROR DE CONEXIÓN";
        document.getElementById('status').className = "status-tag bg-danger text-white";
        console.error(e);
    }
}

window.onload = inicializar;

function buscarCliente() {
    let id = document.getElementById('busCli').value.trim();
    let c = DB.cli[id] || DB.cli[id + ".0"]; // Por si Google agrega .0
    if(c) {
        CLIENTE_S = c;
        document.getElementById('v_nom').innerText = c.Cliente;
        document.getElementById('v_cuit').innerText = c.Cuit;
        document.getElementById('v_dto').innerText = (c.dto || 0) + "%";
        
        let tId = c.Transporte ? c.Transporte.toString().trim() : "";
        document.getElementById('v_tra').innerText = DB.tra[tId] ? DB.tra[tId].Nombre : "A convenir";
        
        document.getElementById('infoCli').style.display = "flex";
        calcular();
    } else {
        alert("Cliente no encontrado en la base de datos.");
    }
}

function nuevaFila() {
    const id = Date.now();
    const h = `
    <div class="item-row" id="r-${id}">
        <div class="row g-2 align-items-center">
            <div class="col-4"><input type="text" class="form-control form-control-sm" placeholder="COD" onchange="buscarProd(this, '${id}')"></div>
            <div class="col-6 small"><div class="fw-bold d-nom text-truncate">-</div><div class="text-muted d-pre">$0</div></div>
            <div class="col-2 text-end"><button class="btn btn-sm text-danger" onclick="document.getElementById('r-${id}').remove(); calcular();">✕</button></div>
            <div class="col-4"><input type="number" class="form-control form-control-sm q-in" value="1" min="1" oninput="calcular()"></div>
        </div>
    </div>`;
    document.getElementById('lista-pedido').insertAdjacentHTML('beforeend', h);
}

function buscarProd(input, id) {
    let cod = input.value.trim().toUpperCase();
    let a = DB.art[cod];
    let row = document.getElementById('r-'+id);
    if(a) {
        row.querySelector('.d-nom').innerText = a.DESCRIPCION;
        let p = parseFloat(a['LISTA 1']) || 0;
        row.querySelector('.d-pre').innerText = "$" + p.toLocaleString('es-AR');
        row.dataset.precio = p;
        calcular();
    } else {
        alert("El código de producto no existe.");
    }
}

function calcular() {
    let sub = 0;
    document.querySelectorAll('.item-row').forEach(r => {
        let p = parseFloat(r.dataset.precio || 0);
        let q = parseFloat(r.querySelector('.q-in').value || 0);
        sub += (p * q);
    });
    let dP = CLIENTE_S ? parseFloat(CLIENTE_S.dto || 0) : 0;
    let total = (sub * (1 - dP/100)) * 1.21;
    document.getElementById('v_total').innerText = "$" + total.toLocaleString('es-AR', {minimumFractionDigits:2});
}

function enviarWA() {
    if(!CLIENTE_S) return alert("Cargá un cliente");
    let m = `*PEDIDO:* ${CLIENTE_S.Cliente}%0A---%0A`;
    document.querySelectorAll('.item-row').forEach(r => {
        let n = r.querySelector('.d-nom').innerText;
        let q = r.querySelector('.q-in').value;
        if(n !== "-") m += `• ${n} (x${q})%0A`;
    });
    m += `---%0A*TOTAL:* ${document.getElementById('v_total').innerText}`;
    window.open(`https://wa.me/5491154678020?text=${m}`);
}

function generarExcel() {
    if(!CLIENTE_S) return alert("Cargá un cliente");
    let data = [["CLIENTE", CLIENTE_S.Cliente], ["PRODUCTO", "CANT", "PRECIO SUBT"]];
    document.querySelectorAll('.item-row').forEach(r => {
        let n = r.querySelector('.d-nom').innerText;
        let q = r.querySelector('.q-in').value;
        let p = r.dataset.precio;
        if(n !== "-") data.push([n, q, (q*p)]);
    });
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Pedido");
    XLSX.writeFile(wb, `Pedido_${CLIENTE_S.Cliente}.xlsx`);
}
</script>
</body>
</html>
