<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResorTecnica S.R.L. | Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #002d5a; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .info-label { font-weight: bold; color: #666; text-transform: uppercase; font-size: 0.65rem; }
        .info-value { color: #000; margin-bottom: 4px; border-bottom: 1px solid #eee; min-height: 1.2rem; font-weight: 500; }
        .item-row { background: white; padding: 10px; border-bottom: 1px solid #eee; }
        .resumen-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
        .nav-pills .nav-link.active { background-color: var(--blue); }
    </style>
</head>
<body>

<div id="loginPage" class="container" style="max-width:400px; margin-top:80px;">
    <div class="card p-4 text-center shadow">
        <h3 class="fw-bold mb-4" style="color: var(--blue);">ResorTecnica</h3>
        <input type="text" id="userInput" class="form-control mb-3" placeholder="Usuario">
        <input type="password" id="passInput" class="form-control mb-4" placeholder="Contraseña">
        <button class="btn btn-primary w-100 fw-bold" onclick="intentarLogin()">INGRESAR</button>
    </div>
</div>

<div id="appPage" class="app-content" style="display:none;">
    <div class="header mb-3">
        <h5 class="fw-bold mb-0">ResorTecnica S.R.L.</h5>
        <div id="status" class="badge bg-light text-dark mt-2">Iniciando...</div>
    </div>

    <div class="container pb-5">
        <ul class="nav nav-pills nav-fill mb-3 bg-white rounded p-1 shadow-sm">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#tab-nuevo">NUEVO PEDIDO</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#tab-historial" onclick="verHistorial()">HISTORIAL</a></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-nuevo">
                <div class="card p-3 shadow-sm">
                    <div class="input-group mb-2">
                        <input type="text" id="busCli" class="form-control fw-bold" placeholder="COD. CLIENTE" onkeydown="if(event.key==='Enter') buscarCliente()">
                        <button class="btn btn-primary" onclick="buscarCliente()">BUSCAR</button>
                    </div>
                    
                    <div id="infoCli" class="mt-2 p-3 bg-white rounded border-start border-4 border-primary" style="display:none;">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="fw-bold text-primary mb-0" id="v_nom"></h6>
                            <span class="badge bg-primary" id="v_cod_display"></span>
                        </div>
                        <div class="row g-2">
                            <div class="col-6"><div class="info-label">CUIT</div><div class="info-value" id="v_cuit"></div></div>
                            <div class="col-6"><div class="info-label">E-MAIL</div><div class="info-value text-lowercase" id="v_mail"></div></div>
                            <div class="col-12"><div class="info-label">Domicilio</div><div class="info-value" id="v_dom"></div></div>
                            <div class="col-6"><div class="info-label">Bonificación</div><div class="info-value text-success fw-bold" id="v_dto">0%</div></div>
                            <div class="col-6"><div class="info-label">Transporte</div><div class="info-value text-danger" id="v_trans"></div></div>
                        </div>
                    </div>
                </div>

                <div class="card overflow-hidden shadow-sm">
                    <div class="card-header bg-light py-2 fw-bold text-muted small">ARTÍCULOS DEL PEDIDO</div>
                    <div id="contenedor-items"></div>
                    <div class="p-2 bg-light">
                        <button class="btn btn-outline-primary btn-sm w-100 fw-bold" onclick="nuevaFila()">+ AGREGAR OTRO ARTÍCULO</button>
                    </div>
                </div>

                <div class="card p-3 border-top border-4 border-primary">
                    <div class="resumen-line"><span>Subtotal Bruto:</span> <span id="res_sub">$0,00</span></div>
                    <div class="resumen-line text-success"><span>Bonif. Cliente (<span id="res_per">0</span>%):</span> <span id="res_dto">-$0,00</span></div>
                    <div class="resumen-line fw-bold"><span>Subtotal Neto:</span> <span id="res_neto">$0,00</span></div>
                    <div class="resumen-line text-muted"><span>IVA (21%):</span> <span id="res_iva">$0,00</span></div>
                    <hr>
                    <div class="resumen-line h4 fw-bold text-primary"><span>TOTAL:</span> <span id="v_total">$0,00</span></div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg fw-bold shadow" onclick="guardarYDescargar()">GUARDAR E IMPRIMIR EXCEL</button>
                    <div class="row g-2">
                        <div class="col-6"><button class="btn btn-success w-100" onclick="enviarWA()">WHATSAPP</button></div>
                        <div class="col-6"><button class="btn btn-dark w-100" onclick="descargarExcelActual()">SOLO EXCEL</button></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-historial">
                <div id="listaHistorial"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const USUARIOS = {
    "Chris": { pass: "0402", folder: "Chris", admin: true },
    "Lucas": { pass: "1234", folder: "01-11 De Blasi" },
    "Carlos": { pass: "1234", folder: "06 Payeres" },
    "Eduardo": { pass: "1234", folder: "07 Morales" },
    "Leandro": { pass: "1234", folder: "10 Serra" },
    "Andres": { pass: "1234", folder: "17 De Felice" },
    "Andrecito": { pass: "1234", folder: "20-21 Gallo" },
    "Hernan": { pass: "1234", folder: "22 Galo" },
    "Francisco": { pass: "1234", folder: "26 Schmid" },
    "Alfredo": { pass: "1234", folder: "30 Pavon" },
    "Ricardo": { pass: "1234", folder: "31 Gudiño" },
    "HernanR": { pass: "1234", folder: "32 Righi" }
};

let DB = { cli: {}, art: {}, tra: {} };
let SESION = null;
let CLIENTE_SEL = null;

function fmt(n) { return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(n); }

function intentarLogin() {
    const u = document.getElementById('userInput').value.trim();
    const p = document.getElementById('passInput').value;
    if (USUARIOS[u] && USUARIOS[u].pass === p) {
        SESION = { user: u, ...USUARIOS[u] };
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
        cargarBase(SESION.folder);
    } else { alert("Usuario o clave incorrectos"); }
}

async function cargarBase(folder) {
    document.getElementById('status').innerText = "Cargando datos...";
    const getCSV = async (n) => {
        try {
            const r = await fetch(`data/${encodeURIComponent(folder)}/${n}.csv?v=${Date.now()}`);
            if(!r.ok) return [];
            const t = await r.text();
            return new Promise(res => {
                Papa.parse(t, { skipEmptyLines: 'greedy', complete: (resul) => {
                    const data = resul.data;
                    let hI = data.findIndex(row => row.some(c => ["CODIGO", "CLIENTE", "ARTICULO", "COD"].includes(c.toString().toUpperCase())));
                    if (hI === -1) hI = 0;
                    const heads = data[hI].map(h => h.toString().trim().toUpperCase());
                    res(data.slice(hI + 1).map(row => {
                        let o = {}; heads.forEach((h, i) => o[h] = row[i] ? row[i].trim() : ""); return o;
                    }));
                }});
            });
        } catch(e) { return []; }
    };

    const [c, a, t] = await Promise.all([getCSV('clientes'), getCSV('lista'), getCSV('transportes')]);
    
    // Indexación flexible para códigos de cliente
    c.forEach(i => { 
        let code = (i.CODIGO || i.COD || "").toString().trim();
        if(code) DB.cli[code] = i; 
    });
    
    a.forEach(i => { 
        let code = (i.CODIGO || i.COD || i.ARTICULO || "").toString().trim().toUpperCase();
        if(code) DB.art[code] = i; 
    });

    t.forEach(i => { DB.tra[(i.CODIGO || i.COD || "").toString().trim()] = i; });

    document.getElementById('status').innerText = "Vendedor: " + folder;
    nuevaFila(); // Cargar primera fila vacía al inicio
}

function buscarCliente() {
    let bus = document.getElementById('busCli').value.trim();
    let c = DB.cli[bus];
    if(c) {
        CLIENTE_SEL = c;
        document.getElementById('v_nom').innerText = c.CLIENTE || c.NOMBRE;
        document.getElementById('v_cod_display').innerText = "CÓD: " + bus;
        document.getElementById('v_cuit').innerText = c.CUIT || "-";
        document.getElementById('v_mail').innerText = c.EMAIL1 || c.EMAIL || "-";
        document.getElementById('v_dom').innerText = (c.DOMICILIO || "-") + ", " + (c.LOCALIDAD || "-");
        document.getElementById('v_dto').innerText = (c.DTO || 0) + "%";
        document.getElementById('res_per').innerText = (c.DTO || 0);
        let tid = (c.TRANSPORTE || "").toString().trim();
        document.getElementById('v_trans').innerText = DB.tra[tid] ? DB.tra[tid].NOMBRE : (tid || "A CONVENIR");
        document.getElementById('infoCli').style.display = "block";
        calcular();
        document.querySelector('.art-input')?.focus();
    } else { alert("Cliente no encontrado. Verifique el código."); }
}

function nuevaFila() {
    const id = Date.now();
    const html = `
    <div class="item-row" id="f-${id}">
        <div class="row g-2 align-items-center">
            <div class="col-4"><input type="text" class="form-control form-control-sm art-input fw-bold" placeholder="CÓDIGO" onkeydown="if(event.key==='Enter') buscarArt(event, '${id}')"></div>
            <div class="col-4 small"><div class="fw-bold d-nom text-truncate">-</div><div class="d-pre text-muted">$0</div></div>
            <div class="col-2"><input type="number" class="form-control form-control-sm q-in text-center" value="1" oninput="calcular()" onkeydown="if(event.key==='Enter') nuevaFila()"></div>
            <div class="col-2 text-end"><button class="btn btn-sm text-danger" onclick="document.getElementById('f-${id}').remove(); calcular();">✕</button></div>
        </div>
    </div>`;
    document.getElementById('contenedor-items').insertAdjacentHTML('beforeend', html);
    const inp = document.querySelectorAll('.art-input'); inp[inp.length-1].focus();
}

function buscarArt(e, id) {
    let cod = e.target.value.trim().toUpperCase();
    let a = DB.art[cod];
    let row = document.getElementById('f-'+id);
    if(a) {
        row.querySelector('.d-nom').innerText = a.DESCRIPCION;
        let p = parseFloat(a['LISTA 1']) || 0;
        row.querySelector('.d-pre').innerText = fmt(p);
        row.dataset.precio = p; row.dataset.nombre = a.DESCRIPCION; row.dataset.codigo = cod;
        row.querySelector('.q-in').focus(); row.querySelector('.q-in').select();
        calcular();
    } else { alert("Artículo no existe."); }
}

function calcular() {
    let sub = 0;
    document.querySelectorAll('[id^="f-"]').forEach(r => {
        sub += (parseFloat(r.dataset.precio || 0) * (r.querySelector('.q-in').value || 0));
    });
    let d = CLIENTE_SEL ? parseFloat(CLIENTE_SEL.DTO || 0) : 0;
    let mDto = sub * (d/100);
    let neto = sub - mDto;
    let iva = neto * 0.21;
    document.getElementById('res_sub').innerText = fmt(sub);
    document.getElementById('res_dto').innerText = "-" + fmt(mDto);
    document.getElementById('res_neto').innerText = fmt(neto);
    document.getElementById('res_iva').innerText = fmt(iva);
    document.getElementById('v_total').innerText = fmt(neto + iva);
}

function guardarYDescargar() {
    if(!CLIENTE_SEL) return alert("Seleccione cliente");
    const p = generarObjetoPedido();
    if(!p) return;
    
    let hist = JSON.parse(localStorage.getItem('RT_HIST_V2') || "[]");
    hist.unshift(p);
    localStorage.setItem('RT_HIST_V2', JSON.stringify(hist));
    
    descargarExcel(p);
    alert("Pedido guardado en historial.");
}

function descargarExcelActual() {
    const p = generarObjetoPedido();
    if(p) descargarExcel(p);
}

function generarObjetoPedido() {
    let items = [];
    document.querySelectorAll('[id^="f-"]').forEach(r => {
        if(r.dataset.nombre) items.push({ c: r.dataset.codigo, n: r.dataset.nombre, q: r.querySelector('.q-in').value, p: r.dataset.precio });
    });
    if(items.length === 0) { alert("Agregue productos"); return null; }

    return {
        id: Date.now(),
        fecha: new Date().toLocaleString(),
        vendedor: SESION.user,
        codCli: (CLIENTE_SEL.CODIGO || CLIENTE_SEL.COD),
        nomCli: (CLIENTE_SEL.CLIENTE || CLIENTE_SEL.NOMBRE),
        cuit: document.getElementById('v_cuit').innerText,
        mail: document.getElementById('v_mail').innerText,
        dom: document.getElementById('v_dom').innerText,
        trans: document.getElementById('v_trans').innerText,
        items: items,
        totales: {
            bruto: document.getElementById('res_sub').innerText,
            per: document.getElementById('res_per').innerText,
            mDto: document.getElementById('res_dto').innerText,
            neto: document.getElementById('res_neto').innerText,
            iva: document.getElementById('res_iva').innerText,
            final: document.getElementById('v_total').innerText
        }
    };
}

function descargarExcel(p) {
    let d = [
        ["RESORTECNICA S.R.L. - COMPROBANTE DE PEDIDO"],
        ["Fecha:", p.fecha], ["Vendedor:", p.vendedor], [],
        ["CÓDIGO CLIENTE:", p.codCli], ["NOMBRE:", p.nomCli],
        ["CUIT:", p.cuit], ["EMAIL:", p.mail], ["DOMICILIO:", p.dom], ["TRANSPORTE:", p.trans], [],
        ["CÓDIGO", "DESCRIPCIÓN", "CANT", "P. LISTA", "SUBTOTAL"]
    ];
    p.items.forEach(i => d.push([i.c, i.n, i.q, parseFloat(i.p), (i.q * i.p)]));
    d.push([], 
        ["", "", "", "SUBTOTAL BRUTO:", p.totales.bruto],
        ["", "", "", "BONIF "+p.totales.per+"%:", p.totales.mDto],
        ["", "", "", "SUBTOTAL NETO:", p.totales.neto],
        ["", "", "", "IVA 21%:", p.totales.iva],
        ["", "", "", "TOTAL A PAGAR:", p.totales.final]
    );
    const ws = XLSX.utils.aoa_to_sheet(d);
    ws['!cols'] = [{wch:15},{wch:45},{wch:8},{wch:15},{wch:15}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Pedido");
    XLSX.writeFile(wb, `Pedido_${p.codCli}_${p.nomCli}.xlsx`);
}

function verHistorial() {
    const cont = document.getElementById('listaHistorial');
    cont.innerHTML = "";
    let h = JSON.parse(localStorage.getItem('RT_HIST_V2') || "[]");
    if(!SESION.admin) h = h.filter(x => x.vendedor === SESION.user);

    if(h.length === 0) { cont.innerHTML = "<p class='text-center mt-4 text-muted'>No hay pedidos.</p>"; return; }

    h.forEach(p => {
        cont.innerHTML += `
        <div class="card p-3 mb-2 border-start border-4 border-primary">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold">[${p.codCli}] ${p.nomCli}</div>
                    <div class="small text-muted">${p.fecha} ${SESION.admin ? '| Vend: '+p.vendedor : ''}</div>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-primary mb-1">${p.totales.final}</div>
                    <button class="btn btn-sm btn-dark" onclick='descargarExcel(${JSON.stringify(p)})'>Excel</button>
                </div>
            </div>
        </div>`;
    });
}

function enviarWA() {
    if(!CLIENTE_SEL) return;
    let txt = `*PEDIDO RESORTECNICA*%0A*Cliente:* ${document.getElementById('v_nom').innerText}%0A---%0A`;
    document.querySelectorAll('[id^="f-"]').forEach(r => { 
        if(r.dataset.nombre) txt += `• ${r.dataset.nombre} (x${r.querySelector('.q-in').value})%0A`;
    });
    txt += `---%0A*TOTAL:* ${document.getElementById('v_total').innerText}`;
    window.open(`https://wa.me/5491154678020?text=${txt}`);
}
</script>
</body>
</html>
