<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResorTecnica Pro | Gestión de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #002d5a; --accent: #e74c3c; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; font-size: 0.9rem; }
        .login-container { max-width: 400px; margin: 60px auto; }
        .app-content { display: none; padding-bottom: 50px; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .status-tag { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; display: inline-block; margin-top: 5px; }
        .info-label { font-weight: bold; color: #555; text-transform: uppercase; font-size: 0.7rem; }
        .info-value { color: #000; margin-bottom: 5px; }
        .item-row { background: white; padding: 10px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .item-row:focus-within { background: #f8f9ff; }
        input:focus { border-color: var(--blue) !important; box-shadow: 0 0 0 0.2rem rgba(0,45,90,0.2) !important; }
    </style>
</head>
<body>

<div id="loginPage" class="container login-container">
    <div class="card p-4 shadow-lg text-center border-top border-4 border-primary">
        <h3 class="fw-bold mb-4" style="color: var(--blue);">ResorTecnica S.R.L.</h3>
        <input type="text" id="userInput" class="form-control mb-3" placeholder="Usuario">
        <input type="password" id="passInput" class="form-control mb-4" placeholder="Contraseña">
        <button class="btn btn-primary w-100 fw-bold py-2 shadow" onclick="intentarLogin()">INGRESAR</button>
    </div>
</div>

<div id="appPage" class="app-content">
    <div class="header mb-3 shadow">
        <h5 class="fw-bold mb-0">ResorTecnica S.R.L.</h5>
        <div id="status" class="status-tag bg-light text-dark">Cargando...</div>
    </div>

    <div class="container">
        <div class="card p-3">
            <div class="input-group shadow-sm">
                <input type="text" id="busCli" class="form-control" placeholder="Cód. Cliente + Enter" onkeydown="handleEnterCliente(event)">
                <button class="btn btn-primary" onclick="buscarCliente()">BUSCAR</button>
            </div>
            
            <div id="infoCli" class="mt-3 p-3 bg-white rounded border-start border-4 border-primary" style="display:none;">
                <div class="fw-bold text-primary h5 mb-2" id="v_nom"></div>
                <div class="row">
                    <div class="col-6"><div class="info-label">CUIT</div><div class="info-value" id="v_cuit">-</div></div>
                    <div class="col-6"><div class="info-label">IVA</div><div class="info-value" id="v_iva">-</div></div>
                    <div class="col-12"><div class="info-label">Domicilio</div><div class="info-value" id="v_dom">-</div></div>
                    <div class="col-6"><div class="info-label">Localidad</div><div class="info-value" id="v_loc">-</div></div>
                    <div class="col-6"><div class="info-label">Provincia</div><div class="info-value" id="v_prov">-</div></div>
                    <div class="col-6"><div class="info-label">Teléfono</div><div class="info-value" id="v_tel">-</div></div>
                    <div class="col-6"><div class="info-label">Email</div><div class="info-value text-lowercase" id="v_mail">-</div></div>
                    <div class="col-6"><div class="info-label">Contacto</div><div class="info-value" id="v_cont">-</div></div>
                    <div class="col-6"><div class="info-label">Bonif.</div><div class="info-value text-success fw-bold" id="v_dto">0%</div></div>
                    <div class="col-12"><div class="info-label">Cond. Pago</div><div class="info-value" id="v_pago">-</div></div>
                    <div class="col-12"><div class="info-label">Transporte</div><div class="info-value text-danger fw-bold" id="v_trans">-</div></div>
                </div>
            </div>
        </div>

        <div class="card overflow-hidden shadow-sm">
            <div class="card-header bg-white py-2 fw-bold text-muted small d-flex justify-content-between">
                <span>PRODUCTOS</span>
                <span id="v_vendedor" class="text-primary"></span>
            </div>
            <div id="contenedor-items"></div>
            <div class="p-2 bg-light">
                <button class="btn btn-outline-primary btn-sm w-100 fw-bold" onclick="nuevaFila()">+ AGREGAR ARTÍCULO</button>
            </div>
        </div>

        <div class="card p-3 mb-4 bg-primary text-white shadow">
            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold small">TOTAL (IVA INC.):</span>
                <span id="v_total" class="h3 fw-bold mb-0">$0,00</span>
            </div>
        </div>

        <div class="d-grid gap-2 mb-5">
            <button class="btn btn-success btn-lg fw-bold shadow" onclick="enviarPedido()">ENVIAR WHATSAPP</button>
            <button class="btn btn-link btn-sm text-muted" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
const USUARIOS = {
    "Chris": { pass: "0402", folder: "Chris" },
    "Lucas": { pass: "1234", folder: "01-11 De Blasi" },
    "Carlos": { pass: "1234", folder: "06 Payeres" },
    "Eduardo": { pass: "1234", folder: "07 Morales" },
    "Leandro": { pass: "1234", folder: "10 Serra" },
    "Andres": { pass: "1234", folder: "17 De Felice" },
    "Andrecito": { pass: "1234", folder: "20-21 Gallo" },
    "Hernan": { pass: "1234", folder: "22 Galo" },
    "Francisco": { pass: "1234", folder: "26 Schmid" },
    "Alfredo": { pass: "1234", folder: "30 Pavon" },
    "Ricardo": { pass: "1234", folder: "31 Gudiño" },
    "HernanR": { pass: "1234", folder: "32 Righi" }
};

let DB = { cli: {}, art: {}, tra: {} };
let SESION = null;
let CLIENTE_SEL = null;

// Normalización agresiva para que los códigos coincidan sí o sí
function norm(txt) {
    if (!txt) return "";
    return txt.toString().trim().toLowerCase().split('.')[0].normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function intentarLogin() {
    const u = document.getElementById('userInput').value.trim();
    const p = document.getElementById('passInput').value;
    if (USUARIOS[u] && USUARIOS[u].pass === p) {
        SESION = USUARIOS[u];
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
        cargarDatosVendedor(SESION.folder);
    } else { alert("Usuario o clave incorrectos"); }
}

async function cargarDatosVendedor(folder) {
    const v = Date.now();
    const fetchCSV = async (name) => {
        const path = `data/${encodeURIComponent(folder)}/${name}.csv?v=${v}`;
        const r = await fetch(path);
        if(!r.ok) return [];
        const text = await r.text();
        
        // PapaParse con detección de cabecera inteligente
        return new Promise(res => {
            Papa.parse(text, {
                skipEmptyLines: 'greedy',
                complete: function(results) {
                    const data = results.data;
                    // Buscamos la fila que tenga las palabras clave (CODIGO o CLIENTE)
                    let headerIndex = data.findIndex(row => 
                        row.some(cell => {
                            let c = norm(cell).toUpperCase();
                            return c === "CODIGO" || c === "CLIENTE" || c === "ARTICULO";
                        })
                    );
                    
                    if (headerIndex === -1) headerIndex = 0;
                    
                    const headers = data[headerIndex].map(h => norm(h).toUpperCase());
                    const rows = data.slice(headerIndex + 1).map(row => {
                        let obj = {};
                        headers.forEach((h, i) => obj[h] = row[i]);
                        return obj;
                    });
                    res(rows);
                }
            });
        });
    };

    try {
        const [c, a, t] = await Promise.all([fetchCSV('clientes'), fetchCSV('lista'), fetchCSV('transportes')]);
        
        c.forEach(i => { let k = i.CODIGO || i.COD; if(k) DB.cli[norm(k)] = i; });
        a.forEach(i => { let k = i.CODIGO || i.COD || i.ARTICULO; if(k) DB.art[norm(k).toUpperCase()] = i; });
        t.forEach(i => { let k = i.CODIGO || i.COD; if(k) DB.tra[norm(k)] = i; });
        
        document.getElementById('status').innerText = "✅ DATOS DE " + folder.toUpperCase() + " CARGADOS";
        document.getElementById('status').className = "status-tag bg-success text-white";
        nuevaFila();
    } catch (e) {
        alert("Error cargando archivos.");
    }
}

function handleEnterCliente(e) {
    if (e.key === 'Enter') {
        buscarCliente();
        setTimeout(() => { document.querySelector('.art-input')?.focus(); }, 300);
    }
}

function buscarCliente() {
    let id = norm(document.getElementById('busCli').value);
    let c = DB.cli[id];
    if(c) {
        CLIENTE_SEL = c;
        document.getElementById('v_nom').innerText = c.CLIENTE || c.NOMBRE;
        document.getElementById('v_cuit').innerText = c.CUIT || "-";
        document.getElementById('v_iva').innerText = c.TIPOIVA || c.IVA || "-";
        document.getElementById('v_dom').innerText = c.DOMICILIO || "-";
        document.getElementById('v_loc').innerText = c.LOCALIDAD || "-";
        document.getElementById('v_prov').innerText = c.PROVINCIA || "-";
        document.getElementById('v_tel').innerText = c.TELEFONO || "-";
        document.getElementById('v_mail').innerText = c.EMAIL1 || c.EMAIL || "-";
        document.getElementById('v_cont').innerText = c.CONTACTO || "-";
        document.getElementById('v_pago').innerText = i['CONDICION DE PAGO'] || i.CONDICION || "-";
        document.getElementById('v_dto').innerText = (c.DTO || 0) + "%";
        document.getElementById('v_vendedor').innerText = "Vendedor: " + (c.VENDEDOR || "-");

        let transId = norm(c.TRANSPORTE);
        let trans = DB.tra[transId];
        document.getElementById('v_trans').innerText = trans ? (trans.NOMBRE || trans.NOMBRE_TRANSPORTE) : "A CONVENIR";
        
        document.getElementById('infoCli').style.display = "block";
        calcular();
    } else { alert("Código " + id + " no encontrado."); }
}

function nuevaFila() {
    const id = Date.now();
    const html = `
    <div class="item-row" id="f-${id}">
        <div class="row g-2 align-items-center">
            <div class="col-4">
                <input type="text" class="form-control form-control-sm art-input fw-bold" placeholder="CÓD + Enter" onkeydown="handleArtKey(event, '${id}')">
            </div>
            <div class="col-4 small">
                <div class="fw-bold d-nom text-truncate">-</div>
                <div class="text-muted d-pre" style="font-size:0.7rem;">$0</div>
            </div>
            <div class="col-2">
                <input type="number" class="form-control form-control-sm q-in text-center" value="1" onkeydown="handleQtyKey(event, '${id}')" oninput="calcular()">
            </div>
            <div class="col-2 text-end">
                <button class="btn btn-sm text-danger" onclick="document.getElementById('f-${id}').remove(); calcular();">✕</button>
            </div>
        </div>
    </div>`;
    document.getElementById('contenedor-items').insertAdjacentHTML('beforeend', html);
    const inputs = document.querySelectorAll('.art-input');
    inputs[inputs.length - 1].focus();
}

function handleArtKey(e, id) {
    if (e.key === 'Enter') {
        e.preventDefault();
        let cod = norm(e.target.value).toUpperCase();
        let a = DB.art[cod];
        let row = document.getElementById('f-'+id);
        if(a) {
            row.querySelector('.d-nom').innerText = a.DESCRIPCION;
            let p = parseFloat(a['LISTA 1']) || 0;
            row.querySelector('.d-pre').innerText = "$" + p.toLocaleString('es-AR');
            row.dataset.precio = p;
            row.dataset.nombre = a.DESCRIPCION;
            row.querySelector('.q-in').focus();
            row.querySelector('.q-in').select();
            calcular();
        } else {
            alert("Articulo '" + cod + "' no existe en la lista.");
        }
    }
}

function handleQtyKey(e, id) {
    if (e.key === 'Enter') {
        e.preventDefault();
        nuevaFila();
    }
}

function calcular() {
    let sub = 0;
    document.querySelectorAll('[id^="f-"]').forEach(r => {
        sub += (parseFloat(r.dataset.precio || 0) * parseFloat(r.querySelector('.q-in').value || 0));
    });
    let d = CLIENTE_SEL ? parseFloat(CLIENTE_SEL.DTO || 0) : 0;
    let tot = (sub * (1 - d/100)) * 1.21;
    document.getElementById('v_total').innerText = "$" + tot.toLocaleString('es-AR', {minimumFractionDigits:2});
}

function enviarPedido() {
    if(!CLIENTE_SEL) return alert("Buscá un cliente primero");
    let items = "";
    document.querySelectorAll('[id^="f-"]').forEach(r => { 
        if(r.dataset.nombre) items += `• ${r.dataset.nombre} (x${r.querySelector('.q-in').value})%0A`; 
    });
    let m = `*NUEVO PEDIDO*%0A*Cliente:* ${document.getElementById('v_nom').innerText}%0A---%0A${items}---%0A*TOTAL:* ${document.getElementById('v_total').innerText}`;
    window.open(`https://wa.me/5491154678020?text=${m}`);
}
</script>
</body>
</html>
